<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuokkaTutor - Typing Game</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">QuokkaTutor</a>
    <ul class="nav-links">
      <li><a href="/learn">Dashboard</a></li>
    </ul>
    <span class="nav-badge" id="nav-name"></span>
  </nav>

  <main class="container text-center">
    <!-- Score -->
    <div class="flex justify-between items-center" style="margin:16px 0;">
      <span class="score-badge" id="score-badge">Score: 0</span>
      <span style="font-weight:700; color:var(--text-light);" id="progress-label">1 / 10</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:10%;"></div>
    </div>

    <!-- Word Display -->
    <div class="typing-prompt" id="prompt-area">
      <div style="font-size:18px; color:var(--text-light); margin-bottom:8px;" id="word-korean">사과</div>
      <div class="word-display" id="word-display">apple</div>
      <div class="word-hint hidden" id="word-hint"></div>
    </div>

    <!-- Input -->
    <div class="typing-input-area">
      <input
        type="text"
        id="typing-input"
        class="form-input"
        style="max-width:400px; font-size:28px; font-weight:700; text-align:center; display:inline-block;"
        placeholder="Type here..."
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        pattern="[a-zA-Z\s]+"
      />
    </div>

    <button class="btn btn-primary mt-2" id="btn-check" onclick="checkAnswer()">Check!</button>

    <!-- Feedback -->
    <div class="flex items-center mt-3 hidden" id="feedback-area" style="justify-content:center; gap:12px;">
      <div style="font-size:40px;">🐻</div>
      <div class="mascot-speech" id="feedback-text"></div>
    </div>

    <!-- Completion -->
    <div class="card hidden" id="completion-state">
      <div style="font-size:80px;">🏆</div>
      <h2 style="font-size:24px; font-weight:800; margin:12px 0;">Typing Game Complete!</h2>
      <p id="completion-text" style="color:var(--text-light);"></p>
      <div class="flex justify-center gap-2 mt-3" style="gap:12px;">
        <button class="btn btn-primary" onclick="restartGame()">다시 하기</button>
        <a href="/chat" class="btn btn-secondary">AI Chat</a>
        <a href="/learn" class="btn btn-outline">Dashboard</a>
      </div>
    </div>
  </main>

  <script src="/js/storage.js"></script>
  <script src="/js/typing.js"></script>
</body>
</html>
