<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuokkaTutor - 학습하기</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">QuokkaTutor</a>
    <ul class="nav-links">
      <li><a href="/learn">Learn</a></li>
      <li><a href="/report">Report</a></li>
    </ul>
    <span class="nav-badge" id="nav-name"></span>
  </nav>

  <main class="container">
    <!-- Greeting -->
    <div class="card flex items-center gap-2" id="greeting-card" style="gap:16px;">
      <div style="font-size:60px;">🐻</div>
      <div>
        <h2 id="greeting-text" style="font-size:20px; font-weight:800;"></h2>
        <p id="greeting-sub" style="color:var(--text-light); font-size:15px;"></p>
      </div>
    </div>

    <!-- Stats -->
    <div class="flex gap-2" style="gap:12px; margin:16px 0;">
      <div class="card text-center" style="flex:1; padding:16px;">
        <div style="font-size:28px; font-weight:800; color:var(--primary);" id="stat-words">0</div>
        <div style="font-size:13px; color:var(--text-light);">배운 단어</div>
      </div>
      <div class="card text-center" style="flex:1; padding:16px;">
        <div style="font-size:28px; font-weight:800; color:var(--success);" id="stat-accuracy">0%</div>
        <div style="font-size:13px; color:var(--text-light);">정확도</div>
      </div>
      <div class="card text-center" style="flex:1; padding:16px;">
        <div style="font-size:28px; font-weight:800; color:var(--secondary);" id="stat-streak">0</div>
        <div style="font-size:13px; color:var(--text-light);">연속 학습</div>
      </div>
    </div>

    <!-- Activity Cards -->
    <h3 style="font-size:18px; font-weight:800; margin:24px 0 12px;">학습 활동</h3>
    <div class="dashboard-grid">
      <a href="/flashcard" class="dashboard-card">
        <div class="card-icon">🃏</div>
        <div class="card-title">Flashcard</div>
        <div class="card-desc">단어 카드를 넘기며 배우기</div>
      </a>
      <a href="/typing" class="dashboard-card">
        <div class="card-icon">⌨️</div>
        <div class="card-title">Typing Game</div>
        <div class="card-desc">단어를 직접 타이핑하기</div>
      </a>
      <a href="/chat" class="dashboard-card">
        <div class="card-icon">💬</div>
        <div class="card-title">AI Chat</div>
        <div class="card-desc">쿼카 선생님과 대화하기</div>
      </a>
    </div>

    <!-- Reset -->
    <div class="text-center mt-4">
      <button class="btn btn-outline btn-sm" onclick="resetProfile()">프로필 초기화</button>
    </div>
  </main>

  <script src="/js/storage.js"></script>
  <script src="/js/learn.js"></script>
</body>
</html>
