<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuokkaTutor - Flashcard</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">QuokkaTutor</a>
    <ul class="nav-links">
      <li><a href="/learn">Dashboard</a></li>
    </ul>
    <span class="nav-badge" id="nav-name"></span>
  </nav>

  <main class="container text-center">
    <!-- Progress -->
    <div style="margin:16px 0;">
      <div class="flex justify-between items-center" style="margin-bottom:4px;">
        <span style="font-weight:700; font-size:15px;" id="progress-label">1 / 10</span>
        <span class="score-badge" id="score-badge">0 correct</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:10%;"></div>
      </div>
    </div>

    <!-- Category Filter -->
    <div class="chip-group justify-center mb-3" id="category-filter">
      <button class="chip selected" data-category="">All</button>
    </div>

    <!-- Flashcard -->
    <div class="flashcard-container">
      <div class="flashcard" id="flashcard" tabindex="0">
        <div class="flashcard-front">
          <div class="word" id="card-english">apple</div>
          <div style="margin-top:16px; font-size:14px; opacity:0.8;">Click or press Space to flip</div>
        </div>
        <div class="flashcard-back">
          <div class="korean" id="card-korean">사과</div>
          <div class="explanation mt-2" id="card-explanation">빨갛고 달콤한 과일이에요</div>
          <div class="example mt-2" id="card-example">"I like to eat an apple."</div>
          <div class="mt-2" style="font-size:13px; color:var(--text-light);" id="card-difficulty"></div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex justify-center gap-2 mt-3" id="action-buttons" style="gap:16px; display:none;">
      <button class="btn btn-danger" id="btn-wrong" onclick="markAnswer(false)">
        모르겠어요
      </button>
      <button class="btn btn-success" id="btn-right" onclick="markAnswer(true)">
        알겠어요!
      </button>
    </div>

    <!-- Completion State -->
    <div class="card hidden" id="completion-state">
      <div style="font-size:80px;">🎉</div>
      <h2 style="font-size:24px; font-weight:800; margin:12px 0;">잘했어요!</h2>
      <p id="completion-text" style="color:var(--text-light);"></p>
      <div class="flex justify-center gap-2 mt-3" style="gap:12px;">
        <button class="btn btn-primary" onclick="restartCards()">다시 하기</button>
        <a href="/typing" class="btn btn-secondary">Typing Game</a>
        <a href="/learn" class="btn btn-outline">Dashboard</a>
      </div>
    </div>

    <!-- Quokka Speech -->
    <div class="flex items-center mt-3" id="mascot-area" style="justify-content:center; gap:12px;">
      <div style="font-size:40px;">🐻</div>
      <div class="mascot-speech" id="mascot-speech">카드를 클릭해서 뒤집어보세요!</div>
    </div>
  </main>

  <script src="/js/storage.js"></script>
  <script src="/js/flashcard.js"></script>
</body>
</html>
