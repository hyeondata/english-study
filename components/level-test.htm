<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuokkaTutor - 레벨 테스트</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <nav class="nav-bar">
    <a href="/" class="nav-logo">QuokkaTutor</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
    </ul>
    <span class="nav-badge" id="nav-name"></span>
  </nav>

  <main class="container-sm">
    <!-- Intro -->
    <div id="intro-state" class="text-center" style="padding-top:40px;">
      <div style="font-size:100px; margin-bottom:16px;">🐨</div>
      <h1 style="font-size:26px; font-weight:800; margin-bottom:8px;">레벨 테스트</h1>
      <p style="color:var(--text-light); font-size:16px; margin-bottom:32px;">
        간단한 문제를 풀고 나에게 맞는 레벨을 찾아보자!<br/>
        총 10문제, 천천히 풀어도 괜찮아요.
      </p>
      <button class="btn btn-primary btn-lg" onclick="startTest()">시작하기</button>
    </div>

    <!-- Test Area -->
    <div id="test-state" class="hidden">
      <!-- Progress -->
      <div style="margin-bottom:20px;">
        <div class="flex justify-between items-center" style="margin-bottom:4px;">
          <span style="font-weight:700; font-size:14px;" id="progress-label">1 / 10</span>
          <span class="score-badge" id="score-badge" style="font-size:14px; padding:4px 12px;">0 correct</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:10%;"></div>
        </div>
      </div>

      <!-- Question Card -->
      <div class="card" id="question-card" style="text-align:center; padding:32px 24px;">
        <div style="font-size:14px; color:var(--text-light); margin-bottom:8px;" id="question-type-badge"></div>
        <h2 style="font-size:22px; font-weight:800; margin-bottom:8px;" id="question-prompt"></h2>
        <p style="font-size:18px; color:var(--primary); font-weight:700; margin-bottom:24px;" id="question-prompt-kr"></p>
        <div id="options-container" style="display:flex; flex-direction:column; gap:12px;"></div>
      </div>

      <!-- Feedback -->
      <div id="feedback-area" class="hidden text-center" style="margin-top:16px;">
        <div style="font-size:48px;" id="feedback-emoji"></div>
        <p style="font-size:18px; font-weight:700;" id="feedback-text"></p>
      </div>
    </div>

    <!-- Loading (calculating result) -->
    <div id="loading-state" class="hidden text-center" style="padding-top:80px;">
      <div style="font-size:80px; margin-bottom:16px;">🐨</div>
      <h2 style="font-size:22px; font-weight:800; margin-bottom:12px;">결과를 계산하고 있어요...</h2>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </main>

  <script src="/js/storage.js"></script>
  <script src="/js/level-test.js"></script>
</body>
</html>
